name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build and bundle
        run: ./scripts/bundle.sh "${GITHUB_REF_NAME#v}"

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/yalyric-*.zip
          generate_release_notes: true
